<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forming Intentional Disciples — Men's Assessment</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #0f1826;
    --navy2:   #172035;
    --navy3:   #1e2d47;
    --cream:   #f0ead8;
    --cream2:  #e4dcc8;
    --cream3:  #cfc5ae;
    --gold:    #b8934a;
    --gold2:   #d4ac6a;
    --gold3:   #e8cfa0;
    --muted:   #7a8899;
    --red:     #c0392b;
    --green:   #1a5c3a;
    --blue:    #1a3a5c;
    --amber:   #7a4f12;
    --purple:  #3a1a5c;
    --sans: 'Crimson Pro', Georgia, serif;
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--cream);
    font-family: var(--sans);
    font-size: 18px;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(184,147,74,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 75%, rgba(15,24,38,0.8) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
    min-height: 100vh;
  }

  /* ── SCREEN TRANSITIONS ── */
  .screen {
    animation: fadeUp .45s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen.out {
    animation: fadeDown .25s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-12px); }
  }

  /* ── WORDMARK / HEADER ── */
  .wordmark {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 3.5rem;
  }
  .cross-icon {
    width: 28px; height: 28px; flex-shrink: 0;
    position: relative;
  }
  .cross-icon::before, .cross-icon::after {
    content: ''; position: absolute;
    background: var(--gold); border-radius: 1px;
  }
  .cross-icon::before { width: 3px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
  .cross-icon::after  { width: 70%; height: 3px; left: 15%; top: 32%; }
  .wordmark-text {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold2);
  }

  /* ── INTRO SCREEN ── */
  .intro-eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .intro-title {
    font-family: var(--serif);
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 500;
    line-height: 1.15;
    color: var(--cream);
    margin-bottom: 1.2rem;
  }
  .intro-title em {
    font-style: italic;
    color: var(--gold2);
  }
  .intro-subtitle {
    font-size: 17px;
    color: var(--cream3);
    line-height: 1.75;
    margin-bottom: 2rem;
    max-width: 580px;
  }
  .rule {
    width: 48px; height: 1px;
    background: var(--gold);
    margin: 2rem 0;
    opacity: .6;
  }
  .framework-pills {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 2.5rem;
  }
  .pill {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: .04em;
    padding: 5px 14px;
    border: 1px solid rgba(184,147,74,.35);
    border-radius: 100px;
    color: var(--gold3);
  }
  .bias-callout {
    background: rgba(184,147,74,.07);
    border-left: 2px solid var(--gold);
    border-radius: 0 6px 6px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 2.5rem;
    font-size: 15px;
    color: var(--cream3);
    line-height: 1.7;
  }
  .bias-callout strong {
    color: var(--gold2);
    font-weight: 600;
  }
  .meta-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 8px; overflow: hidden;
    margin-bottom: 2.5rem;
  }
  .meta-item {
    background: var(--navy2);
    padding: 1rem;
    text-align: center;
  }
  .meta-num {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 500;
    color: var(--gold2);
    line-height: 1;
    display: block;
    margin-bottom: 4px;
  }
  .meta-lbl {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .05em;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--gold);
    color: var(--navy);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 14px 32px;
    border: none; border-radius: 4px;
    cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary svg { width: 16px; height: 16px; }

  /* ── QUESTION SCREEN ── */
  .q-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .section-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .q-counter {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--muted);
  }
  .progress-track {
    height: 2px;
    background: rgba(255,255,255,.1);
    border-radius: 2px;
    margin-bottom: 2.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .q-text {
    font-family: var(--serif);
    font-size: clamp(1.3rem, 3.5vw, 1.7rem);
    font-weight: 500;
    line-height: 1.35;
    color: var(--cream);
    margin-bottom: 1.25rem;
  }
  .q-guard {
    display: flex; gap: 10px; align-items: flex-start;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(184,147,74,.2);
    border-radius: 6px;
    padding: .75rem 1rem;
    margin-bottom: 1.75rem;
    font-size: 14px;
    color: var(--cream3);
    line-height: 1.6;
    font-style: italic;
  }
  .guard-icon {
    width: 16px; height: 16px; flex-shrink: 0;
    margin-top: 3px;
    color: var(--gold);
  }
  .pair-instruction {
    font-size: 13px; font-style: italic; color: var(--muted);
    margin-bottom: 1.25rem; line-height: 1.5;
  }
  .pair-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    margin-bottom: 2.5rem;
    align-items: stretch;
  }
  .pair-card {
    padding: 1.25rem 1.4rem;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 8px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 300;
    color: var(--cream2);
    line-height: 1.65;
    background: rgba(255,255,255,.02);
    transition: border-color .15s, background .15s, color .15s;
    position: relative;
  }
  .pair-card:hover {
    border-color: rgba(184,147,74,.45);
    background: rgba(184,147,74,.05);
    color: var(--cream);
  }
  .pair-card.selected {
    border-color: var(--gold);
    background: rgba(184,147,74,.1);
    color: var(--cream);
  }
  .pair-card.selected::after {
    content: '';
    position: absolute; top: 12px; right: 12px;
    width: 10px; height: 10px;
    background: var(--gold);
    border-radius: 50%;
    box-shadow: 0 0 0 3px rgba(184,147,74,.25);
  }
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .btn-ghost {
    background: none;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,.3); color: var(--cream2); }
  .btn-ghost:disabled { opacity: .3; cursor: default; }
  .btn-next {
    display: inline-flex; align-items: center; gap: 8px;
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold2);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-next:hover { background: var(--gold); color: var(--navy); }
  .btn-next:disabled { opacity: .3; cursor: default; border-color: rgba(255,255,255,.2); color: var(--muted); }
  .btn-next:disabled:hover { background: none; color: var(--muted); }

  /* ── RESULTS SCREEN ── */
  .result-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .18em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
  }
  .phase-hero {
    border-radius: 10px; overflow: hidden;
    margin-bottom: 2rem;
    border: 1px solid rgba(255,255,255,.08);
  }
  .phase-hero-band {
    padding: 1.5rem 1.75rem;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .phase-number {
    font-family: var(--serif);
    font-size: 3.5rem;
    font-weight: 500;
    line-height: 1;
    opacity: .25;
    flex-shrink: 0;
  }
  .phase-hero-text {}
  .phase-label-sm {
    font-size: 11px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; opacity: .7; margin-bottom: 5px;
  }
  .phase-name-lg {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 500;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .phase-desc {
    font-size: 16px; line-height: 1.7; opacity: .85;
  }
  .phase-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 1rem 1.75rem;
    border-top: 1px solid rgba(255,255,255,.06);
    background: rgba(0,0,0,.15);
  }
  .phase-tag {
    font-size: 12px; padding: 4px 12px;
    border-radius: 100px;
    border: 1px solid currentColor;
    opacity: .75;
  }
  .dim-section { margin-bottom: 2rem; }
  .section-rule {
    display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem;
  }
  .section-rule-label {
    font-size: 11px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted); white-space: nowrap;
  }
  .section-rule-line {
    flex: 1; height: 1px; background: rgba(255,255,255,.08);
  }
  .dim-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .dim-card {
    background: var(--navy2);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 8px; padding: 1rem 1.1rem;
  }
  .dim-card-lbl {
    font-size: 11px; color: var(--muted); letter-spacing: .05em; margin-bottom: 6px;
  }
  .dim-card-val {
    font-family: var(--serif);
    font-size: 1.1rem; color: var(--cream); font-weight: 500; margin-bottom: 6px;
  }
  .dim-bar { height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
  .dim-bar-fill { height: 100%; border-radius: 2px; }
  .warn-card {
    background: rgba(184,147,74,.07);
    border: 1px solid rgba(184,147,74,.25);
    border-radius: 8px; padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    font-size: 15px; color: var(--cream3); line-height: 1.7;
  }
  .warn-card strong { color: var(--gold2); font-weight: 600; }
  .pastoral-section { margin-bottom: 2rem; }
  .pastoral-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: .85rem 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
    font-size: 16px; color: var(--cream2); line-height: 1.6;
  }
  .pastoral-item:last-child { border-bottom: none; }
  .pastoral-num {
    font-family: var(--serif);
    font-size: 1.1rem; color: var(--gold); flex-shrink: 0; margin-top: 1px;
    width: 24px;
  }
  .actions-row {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 2.5rem;
    padding-top: 2rem; border-top: 1px solid rgba(255,255,255,.07);
  }
  .btn-outline {
    background: none;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--cream3);
    font-family: var(--sans);
    font-size: 14px; font-weight: 400;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 10px 22px; border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,.3); color: var(--cream); }

  /* ── PHASE COLORS ── */
  .p1 { --pc: #888780; --pb: rgba(136,135,128,.12); }
  .p2 { --pc: #B8860B; --pb: rgba(184,134,11,.12); }
  .p3 { --pc: #2a7a50; --pb: rgba(42,122,80,.12); }
  .p4 { --pc: #2a6090; --pb: rgba(42,96,144,.12); }
  .p5 { --pc: #7a4ab0; --pb: rgba(122,74,176,.12); }

  .phase-hero { background: var(--pb); border-color: color-mix(in srgb, var(--pc) 35%, transparent); }
  .phase-hero-band { color: color-mix(in srgb, var(--pc) 80%, var(--cream)); }
  .phase-number { color: var(--pc); opacity: .3; }
  .phase-label-sm { color: var(--pc); }
  .phase-name-lg { color: var(--cream); }
  .phase-tag { color: var(--pc); border-color: color-mix(in srgb, var(--pc) 50%, transparent); }
  .dim-bar-fill { background: var(--pc); }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; color: #1a1a1a; }
    body::before { display: none; }
    .btn-primary, .btn-ghost, .btn-next, .btn-outline, .actions-row { display: none; }
    .phase-hero { background: #f5f5f0; border: 1px solid #ccc; }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #app { padding: 1.75rem 1.25rem 4rem; }
    .meta-grid { grid-template-columns: repeat(3,1fr); }
    .dim-grid { grid-template-columns: 1fr; }
    .pair-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const QS = [
  {
    section: "Section 1 — Interior Life",
    a: { t: "When someone brings up religion around you, your honest instinct is to keep things surface-level. Your faith is real to you in some sense, but it belongs to a private part of life you don't open up easily.", s:{thr:1,soil:1,ls:1,hap:1} },
    b: { t: "Something has cracked open in the last few years. You find yourself thinking more seriously about God and whether your faith means something real — questions you can't fully dismiss, even when life gets busy.", s:{thr:2,soil:2,ls:2,hap:2} }
  },
  {
    section: "Section 1 — Interior Life",
    a: { t: "Your prayer outside of formal settings — Mass, meals, a funeral — is minimal. It feels awkward to initiate, like calling someone you haven't spoken to in years.", s:{thr:1,soil:1,ls:1,hap:1} },
    b: { t: "Since something shifted in you, you've been talking to God more — not perfectly and not always consistently, but it's real. There are mornings you genuinely want to pray rather than feeling like you should.", s:{thr:3,soil:2,ls:3,hap:3} }
  },
  {
    section: "Section 1 — Interior Life",
    a: { t: "Your faith has always been something you've lived in and around, but if someone asked whether you've ever made a conscious personal decision to follow Christ — a specific moment of surrender — you couldn't point to one.", s:{thr:2,soil:2,ls:2,hap:2} },
    b: { t: "There was a real moment — a retreat, a confession, a night alone — when you made a specific decision to surrender to Jesus. Not just intellectual agreement, but an act of will that changed your direction. You can point to it.", s:{thr:5,soil:3,ls:3,hap:3} }
  },
  {
    section: "Section 2 — Condition of the Heart",
    a: { t: "Your faith and your ordinary week mostly occupy separate spaces. The decisions you make about work, money, and relationships don't run through a spiritual filter in any consistent way.", s:{thr:1,soil:1,ls:1,hap:1} },
    b: { t: "You've started noticing a gap between what you believe and how you actually live — and the gap bothers you. Something is asking you to close it, even if you're not sure yet how.", s:{thr:2,soil:2,ls:2,hap:2} }
  },
  {
    section: "Section 2 — Condition of the Heart",
    a: { t: "When the last genuinely hard season hit — a failure, a loss, a prolonged stretch of suffering — your faith faded or went quiet. It felt distant when you needed it most, and you're not sure it actually held.", s:{thr:2,soil:2,ls:2,hap:1} },
    b: { t: "When the last genuinely hard season hit, your faith held — not easily, not without cost — but it deepened rather than shrank. You came out with more trust in God than you went in with.", s:{thr:5,soil:4,ls:4,hap:4} }
  },
  {
    section: "Section 2 — Condition of the Heart",
    a: { t: "The thing that most competes with your faith — pornography, drinking, money anxiety, workaholism, or something else — is still mostly winning. You can see it clearly, but you're not really in a fight against it.", s:{thr:2,soil:2,ls:2,hap:2} },
    b: { t: "You're in an active fight against your main thorn. You've confessed it, you've told another man about it, and you've changed something about your life to take it seriously. You're not winning every round, but you're in the ring.", s:{thr:4,soil:3,ls:3,hap:3} }
  },
  {
    section: "Section 3 — Tested & Formed",
    a: { t: "Your spiritual life since your conversion has mostly been driven by how you feel — inspired seasons followed by dry ones. You don't yet have a consistent daily practice or a man you're genuinely accountable to.", s:{thr:3,soil:2,ls:3,hap:3} },
    b: { t: "You have daily practices that are non-negotiable — prayer, Scripture, the sacraments on a real rhythm — and at least one relationship where another man can speak honestly into your life. When these slip, you notice the difference.", s:{thr:5,soil:4,ls:4,hap:4} }
  },
  {
    section: "Section 3 — Tested & Formed",
    a: { t: "Since the moment you really committed your faith, you haven't been through a serious dark night — a prolonged season where God felt absent, where your roots were tested by something that didn't resolve quickly.", s:{thr:3,soil:2,ls:3,hap:3} },
    b: { t: "Since committing, your faith has been through at least one genuine dark night — a season of failure, doubt, or suffering where the roots were tested under real weight. It didn't end your faith. It changed it.", s:{thr:5,soil:4,ls:4,hap:4} }
  },
  {
    section: "Section 3 — Tested & Formed",
    a: { t: "Your faith hasn't cost you anything you'd call significant. It fits within your life without generating serious conflict, loss, or damage to how people see you.", s:{thr:1,soil:1,ls:1,hap:1} },
    b: { t: "Your faith has cost you something real — a friendship, an opportunity, standing with someone you respected, or something you genuinely wanted. You'd make the same choice again, but it was a genuine loss.", s:{thr:5,soil:3,ls:3,hap:3} }
  },
  {
    section: "Section 4 — Giving & Fatherhood",
    a: { t: "You're growing in your faith and receiving a great deal — from your small group, your prayer life, your community. But you're not yet consistently and intentionally walking alongside a specific man earlier in the journey.", s:{thr:5,soil:3,ls:3,hap:3} },
    b: { t: "You're walking with at least one specific younger or less-formed man right now — praying with him, asking him hard questions, watching him grow. You can name him. It's among the most alive parts of your spiritual life.", s:{thr:6,soil:4,ls:5,hap:4} }
  },
  {
    section: "Section 4 — Giving & Fatherhood",
    a: { t: "The deepest satisfaction in your faith right now is personal — what God has done in your own life, the peace you've found, the way it's changed your marriage or your sense of purpose. That's where the joy is.", s:{thr:4,soil:3,ls:3,hap:3} },
    b: { t: "The deepest satisfaction in your faith now comes from watching other men change — seeing a man cross a threshold, watching someone you've walked with step into his calling. Your joy is found more in them than in yourself.", s:{thr:6,soil:4,ls:5,hap:4} }
  },
  {
    section: "Section 4 — Giving & Fatherhood",
    a: { t: "When you think about your spiritual life, your attention is mostly inward — your own growth, your own struggles, what you still need to receive. That's where the energy and the questions live.", s:{thr:2,soil:2,ls:2,hap:2} },
    b: { t: "When you think about your spiritual life, your attention has shifted outward — toward the men around you who need what you've been given. You think more about who you're releasing than about what you still need.", s:{thr:6,soil:4,ls:5,hap:4} }
  }
];

const PHASES = [
  {
    id:1, cls:'p1',
    label:"Phase 1",
    name:"Pre-Evangelization",

  {

  {

    label:"Phase 3",

    threshold:"Spiritual Seeking → Intentional Discipleship",

      "Explicitly invite a surrender decision if it has not been made clearly",

  {

    label:"Phase 4",

    threshold:"Intentional Discipleship",

    threshold:"Apostolic Mission",

    pastoral:[
      "Commission and deploy into specific apostolates and mentoring relationships",

      "Honor his elder role explicitly — name it, celebrate it, protect it",
      "Guard against complacency: the Mission phase requires ongoing renewal, not coasting"
    ]
  }
];

const DIMS = [
  { key:'thr', label:'Threshold (Waddell)', labels:['Initial Trust','Curiosity','Openness / Seeking','Seeking → Discipleship','Intentional Disciple','Apostolic Mission'] },
  { key:'soil', label:'Soil type (Parable)', labels:['Path / Hard Ground','Rocky Ground','Thorny Ground breaking','Rocky → Good Soil','Good Soil (cultivated)'] },
  { key:'ls', label:'Lifestage', labels:['Wounded Boy','Seeker','Young Man (early)','Young Man (maturing)','Father / King / Elder'] },
  { key:'hap', label:'Happiness level (Spitzer)', labels:['Level 1 dominant','Level 1–2','Level 2–3 transition','Level 3 awakening','Level 4 integration'] }
];

let cur = 0, answers = [], shuffles = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function avg(scores, key) {
  let sum = 0;
  scores.forEach(s => sum += s[key]);
  return sum / scores.length;
}

function getPhase(answers) {
  const scores = answers.map((dispIdx, qi) => {
    const flipped = shuffles[qi];
    const origIdx = flipped ? 1 - dispIdx : dispIdx;
    return origIdx === 0 ? QS[qi].a.s : QS[qi].b.s;
  });
  const a = {
    thr: avg(scores,'thr'),
    soil: avg(scores,'soil'),
    ls: avg(scores,'ls'),
    hap: avg(scores,'hap')
  };
  const raw = (a.thr + a.soil + a.ls + a.hap) / 4;
  const adj = Math.max(1, raw - 0.3);
  const idx = Math.min(4, Math.max(0, Math.round(adj) - 1));
  return { phase: PHASES[idx], avgs: a };
}

function dimLabel(d, v) {
  const idx = Math.min(d.labels.length-1, Math.max(0, Math.round(v)-1));
  return d.labels[idx];
}

function dimPct(v) {
  return Math.round(((v-1)/4)*100);
}

/* ── RENDER ── */
function renderIntro() {
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="wordmark">
        <div class="cross-icon"></div>
        <div class="wordmark-text">Men's Ministry Assessment</div>
      </div>
      <div class="intro-eyebrow">Forming Intentional Disciples</div>
      <h1 class="intro-title">Where is this man <em>on the journey?</em></h1>
      <p class="intro-subtitle">
        This assessment places a man within the Integrated Framework — five pastoral phases drawn from Waddell's thresholds, the Parable of the Sower, the spiritual lifestages of men, and Spitzer's four levels of happiness.
      </p>
      <div class="rule"></div>
      <div class="framework-pills">
        <span class="pill">Waddell's Thresholds</span>
        <span class="pill">Parable of the Sower</span>
        <span class="pill">Spiritual Lifestages</span>
        <span class="pill">Spitzer's Happiness Levels</span>
      </div>
      <div class="bias-callout">
        <strong>Built-in bias protection.</strong> Each question includes a "bias check" prompt that names the most common way men over-report their spiritual maturity. Scoring is intentionally conservative: when answers span two adjacent phases, placement defaults to the lower one. External behaviors — Mass attendance, parish roles, volunteering — do not advance the result.
      </div>
      <div class="meta-grid">
        <div class="meta-item"><span class="meta-num">12</span><span class="meta-lbl">Questions</span></div>
        <div class="meta-item"><span class="meta-num">4</span><span class="meta-lbl">Dimensions</span></div>
        <div class="meta-item"><span class="meta-num">5</span><span class="meta-lbl">Phases</span></div>
      </div>
      <button class="btn-primary" onclick="startAssessment()">
        Begin Assessment
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
      </button>
    </div>`;
}

function renderQuestion() {
  const q = QS[cur];
  const pct = Math.round((cur / QS.length) * 100);
  const sel = answers[cur];
  const flipped = shuffles[cur] || false;
  const left  = flipped ? q.b : q.a;
  const right = flipped ? q.a : q.b;
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="wordmark">
        <div class="cross-icon"></div>
        <div class="wordmark-text">Men's Ministry Assessment</div>
      </div>
      <div class="q-header">
        <span class="section-badge">${q.section}</span>
        <span class="q-counter">${cur+1} / ${QS.length}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <p class="pair-instruction">Neither may describe you perfectly — choose the one that fits your life more closely right now.</p>
      <div class="pair-grid">
        <div class="pair-card${sel===0?' selected':''}" onclick="selectOpt(0)">${left.t}</div>
        <div class="pair-card${sel===1?' selected':''}" onclick="selectOpt(1)">${right.t}</div>
      </div>
      <div class="nav-row">
        <button class="btn-ghost" onclick="goBack()" ${cur===0?'disabled':''}>← Back</button>
        <button class="btn-next" id="nextBtn" onclick="goNext()" ${sel===undefined?'disabled':''}>
          ${cur===QS.length-1 ? 'See Results' : 'Next'}
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </button>
      </div>
    </div>`;
}

function renderResult() {
  const { phase: p, avgs } = getPhase(answers);
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="wordmark">
        <div class="cross-icon"></div>
        <div class="wordmark-text">Assessment Result</div>
      </div>
      <div class="result-eyebrow">Integrated Framework Placement</div>
      <div class="phase-hero ${p.cls}">
        <div class="phase-hero-band">
          <div class="phase-number">${p.id}</div>
          <div class="phase-hero-text">
            <div class="phase-label-sm">${p.label}</div>
            <div class="phase-name-lg">${p.name}</div>
            <div class="phase-desc">${p.desc}</div>
          </div>
        </div>
        <div class="phase-tags">
          <span class="phase-tag">${p.threshold}</span>
          <span class="phase-tag">${p.soil}</span>
          <span class="phase-tag">${p.lifestage}</span>
          <span class="phase-tag">${p.happiness}</span>
        </div>
      </div>

      <div class="dim-section">
        <div class="section-rule">
          <span class="section-rule-label">Dimension Breakdown</span>
          <div class="section-rule-line"></div>
        </div>
        <div class="dim-grid">
          ${DIMS.map(d => `
            <div class="dim-card">
              <div class="dim-card-lbl">${d.label}</div>
              <div class="dim-card-val">${dimLabel(d, avgs[d.key])}</div>
              <div class="dim-bar"><div class="dim-bar-fill ${p.cls}" style="width:${dimPct(avgs[d.key])}%"></div></div>
            </div>`).join('')}
        </div>
      </div>

      <div class="warn-card">
        <strong>Bias check for this placement:</strong> ${p.warn}
      </div>

      <div class="pastoral-section">
        <div class="section-rule">
          <span class="section-rule-label">Pastoral Priorities</span>
          <div class="section-rule-line"></div>
        </div>
        ${p.pastoral.map((s,i) => `
          <div class="pastoral-item">
            <span class="pastoral-num">${i+1}.</span>
            <span>${s}</span>
          </div>`).join('')}
      </div>

      <div class="actions-row">
        <button class="btn-primary" onclick="restart()">
          Assess another man
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8h10M9 4l4 4-4 4"/></svg>
        </button>
        <button class="btn-outline" onclick="window.print()">Print result</button>
      </div>
    </div>`;
}

/* ── ACTIONS ── */
function startAssessment() { cur = 0; answers = []; shuffles = QS.map(() => Math.random() < 0.5); renderQuestion(); }
function restart() { cur = 0; answers = []; shuffles = []; renderIntro(); }

function selectOpt(i) {
  answers[cur] = i;
  renderQuestion();
}

function goNext() {
  if (answers[cur] === undefined) return;
  if (cur < QS.length - 1) { cur++; renderQuestion(); }
  else { renderResult(); }
}

function goBack() {
  if (cur > 0) { cur--; renderQuestion(); }
  else { renderIntro(); }
}

/* ── INIT ── */
renderIntro();
</script>
