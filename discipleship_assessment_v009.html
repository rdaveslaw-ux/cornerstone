<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forming Intentional Disciples — Men's Assessment</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #0f1826;
    --navy2:   #172035;
    --navy3:   #1e2d47;
    --cream:   #f0ead8;
    --cream2:  #e4dcc8;
    --cream3:  #cfc5ae;
    --gold:    #b8934a;
    --gold2:   #d4ac6a;
    --gold3:   #e8cfa0;
    --muted:   #7a8899;
    --red:     #c0392b;
    --green:   #1a5c3a;
    --blue:    #1a3a5c;
    --amber:   #7a4f12;
    --purple:  #3a1a5c;
    --sans: 'Crimson Pro', Georgia, serif;
    --serif: 'Cormorant Garamond', 'Times New Roman', serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--cream);
    /*font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;*/
    font-family: var(--sans); 
    font-size: 18px;
    font-weight: 300;
    line-height: 1.7;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── TEXTURE ── */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(ellipse 80% 60% at 15% 20%, rgba(184,147,74,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 85% 75%, rgba(15,24,38,0.8) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  /* ── LAYOUT ── */
  #app {
    position: relative; z-index: 1;
    max-width: 720px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
    min-height: 100vh;
  }

  /* ── SCREEN TRANSITIONS ── */
  .screen {
    animation: fadeUp .45s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .screen.out {
    animation: fadeDown .25s ease both;
  }
  @keyframes fadeDown {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-12px); }
  }

  /* ── WORDMARK / HEADER ── */
  .wordmark {
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 3.5rem;
  }
  .cross-icon {
    width: 28px; height: 28px; flex-shrink: 0;
    position: relative;
  }
  .cross-icon::before, .cross-icon::after {
    content: ''; position: absolute;
    background: var(--gold); border-radius: 1px;
  }
  .cross-icon::before { width: 3px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
  .cross-icon::after  { width: 70%; height: 3px; left: 15%; top: 32%; }
  .wordmark-text {
    font-family: var(--serif);
    font-size: 13px;
    font-weight: 400;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--gold2);
  }

  /* ── INTRO SCREEN ── */
  .intro-eyebrow {
    font-family: var(--sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }
  .intro-title {
    font-family: var(--serif);
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    font-weight: 500;
    line-height: 1.15;
    color: var(--cream);
    margin-bottom: 1.2rem;
  }
  .intro-title em {
    font-style: italic;
    color: var(--gold2);
  }
  .intro-subtitle {
    font-size: 17px;
    color: var(--cream3);
    line-height: 1.75;
    margin-bottom: 2rem;
    max-width: 580px;
  }
  .rule {
    width: 48px; height: 1px;
    background: var(--gold);
    margin: 2rem 0;
    opacity: .6;
  }
  .framework-pills {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 2.5rem;
  }
  .pill {
    font-size: 12px;
    font-weight: 400;
    letter-spacing: .04em;
    padding: 5px 14px;
    border: 1px solid rgba(184,147,74,.35);
    border-radius: 100px;
    color: var(--gold3);
  }
  .bias-callout {
    background: rgba(184,147,74,.07);
    border-left: 2px solid var(--gold);
    border-radius: 0 6px 6px 0;
    padding: 1rem 1.25rem;
    margin-bottom: 2.5rem;
    font-size: 15px;
    color: var(--cream3);
    line-height: 1.7;
  }
  .bias-callout strong {
    color: var(--gold2);
    font-weight: 600;
  }
  .meta-grid {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 1px; background: rgba(255,255,255,.07);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 8px; overflow: hidden;
    margin-bottom: 2.5rem;
  }
  .meta-item {
    background: var(--navy2);
    padding: 1rem;
    text-align: center;
  }
  .meta-num {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 500;
    color: var(--gold2);
    line-height: 1;
    display: block;
    margin-bottom: 4px;
  }
  .meta-lbl {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .05em;
  }
  .btn-primary {
    display: inline-flex; align-items: center; gap: 10px;
    background: var(--gold);
    color: var(--navy);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 14px 32px;
    border: none; border-radius: 4px;
    cursor: pointer;
    transition: background .2s, transform .15s;
  }
  .btn-primary:hover { background: var(--gold2); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-primary svg { width: 16px; height: 16px; }

  /* ── QUESTION SCREEN ── */
  .q-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .section-badge {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--gold);
  }
  .q-counter {
    font-family: var(--serif);
    font-size: 15px;
    color: var(--muted);
  }
  .progress-track {
    height: 2px;
    background: rgba(255,255,255,.1);
    border-radius: 2px;
    margin-bottom: 2.5rem;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 2px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }
  .q-text {
    font-family: var(--serif);
    font-size: clamp(1.3rem, 3.5vw, 1.7rem);
    font-weight: 500;
    line-height: 1.35;
    color: var(--cream);
    margin-bottom: 1.25rem;
  }
  .q-guard {
    display: flex; gap: 10px; align-items: flex-start;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(184,147,74,.2);
    border-radius: 6px;
    padding: .75rem 1rem;
    margin-bottom: 1.75rem;
    font-size: 14px;
    color: var(--cream3);
    line-height: 1.6;
    font-style: italic;
  }
  .guard-icon {
    width: 16px; height: 16px; flex-shrink: 0;
    margin-top: 3px;
    color: var(--gold);
  }
  .opts { display: flex; flex-direction: column; gap: 10px; margin-bottom: 2.5rem; }
  .opt {
    padding: 14px 18px;
    border: 1px solid rgba(255,255,255,.1);
    border-radius: 6px;
    cursor: pointer;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 300;
    color: var(--cream2);
    line-height: 1.55;
    background: rgba(255,255,255,.02);
    transition: border-color .15s, background .15s, color .15s;
    position: relative;
    padding-left: 48px;
  }
  .opt::before {
    content: '';
    position: absolute; left: 16px; top: 50%;
    transform: translateY(-50%);
    width: 16px; height: 16px;
    border: 1.5px solid rgba(255,255,255,.25);
    border-radius: 50%;
    transition: border-color .15s, background .15s;
  }
  .opt:hover {
    border-color: rgba(184,147,74,.45);
    background: rgba(184,147,74,.06);
    color: var(--cream);
  }
  .opt:hover::before { border-color: var(--gold); }
  .opt.selected {
    border-color: var(--gold);
    background: rgba(184,147,74,.1);
    color: var(--cream);
  }
  .opt.selected::before {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(184,147,74,.25);
  }
  .opt.selected::after {
    content: '';
    position: absolute; left: 20px; top: 50%;
    transform: translateY(-50%);
    width: 8px; height: 8px;
    background: var(--navy);
    border-radius: 50%;
  }
  .nav-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .btn-ghost {
    background: none;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 10px 22px;
    border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-ghost:hover { border-color: rgba(255,255,255,.3); color: var(--cream2); }
  .btn-ghost:disabled { opacity: .3; cursor: default; }
  .btn-next {
    display: inline-flex; align-items: center; gap: 8px;
    background: none;
    border: 1px solid var(--gold);
    color: var(--gold2);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 4px;
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .btn-next:hover { background: var(--gold); color: var(--navy); }
  .btn-next:disabled { opacity: .3; cursor: default; border-color: rgba(255,255,255,.2); color: var(--muted); }
  .btn-next:disabled:hover { background: none; color: var(--muted); }

  /* ── RESULTS SCREEN ── */
  .result-eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: .18em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 1rem;
  }
  .phase-hero {
    border-radius: 10px; overflow: hidden;
    margin-bottom: 2rem;
    border: 1px solid rgba(255,255,255,.08);
  }
  .phase-hero-band {
    padding: 1.5rem 1.75rem;
    display: flex; align-items: flex-start; gap: 16px;
  }
  .phase-number {
    font-family: var(--serif);
    font-size: 3.5rem;
    font-weight: 500;
    line-height: 1;
    opacity: .25;
    flex-shrink: 0;
  }
  .phase-hero-text {}
  .phase-label-sm {
    font-size: 11px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; opacity: .7; margin-bottom: 5px;
  }
  .phase-name-lg {
    font-family: var(--serif);
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 500;
    line-height: 1.2;
    margin-bottom: 10px;
  }
  .phase-desc {
    font-size: 16px; line-height: 1.7; opacity: .85;
  }
  .phase-tags {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 1rem 1.75rem;
    border-top: 1px solid rgba(255,255,255,.06);
    background: rgba(0,0,0,.15);
  }
  .phase-tag {
    font-size: 12px; padding: 4px 12px;
    border-radius: 100px;
    border: 1px solid currentColor;
    opacity: .75;
  }
  .dim-section { margin-bottom: 2rem; }
  .section-rule {
    display: flex; align-items: center; gap: 12px; margin-bottom: 1.25rem;
  }
  .section-rule-label {
    font-size: 11px; font-weight: 600; letter-spacing: .14em;
    text-transform: uppercase; color: var(--muted); white-space: nowrap;
  }
  .section-rule-line {
    flex: 1; height: 1px; background: rgba(255,255,255,.08);
  }
  .dim-grid {
    display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;
  }
  .dim-card {
    background: var(--navy2);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 8px; padding: 1rem 1.1rem;
  }
  .dim-card-lbl {
    font-size: 11px; color: var(--muted); letter-spacing: .05em; margin-bottom: 6px;
  }
  .dim-card-val {
    font-family: var(--serif);
    font-size: 1.1rem; color: var(--cream); font-weight: 500; margin-bottom: 6px;
  }
  .dim-bar { height: 3px; background: rgba(255,255,255,.1); border-radius: 2px; overflow: hidden; }
  .dim-bar-fill { height: 100%; border-radius: 2px; }
  .warn-card {
    background: rgba(184,147,74,.07);
    border: 1px solid rgba(184,147,74,.25);
    border-radius: 8px; padding: 1rem 1.25rem;
    margin-bottom: 2rem;
    font-size: 15px; color: var(--cream3); line-height: 1.7;
  }
  .warn-card strong { color: var(--gold2); font-weight: 600; }
  .pastoral-section { margin-bottom: 2rem; }
  .pastoral-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: .85rem 0;
    border-bottom: 1px solid rgba(255,255,255,.05);
    font-size: 16px; color: var(--cream2); line-height: 1.6;
  }
  .pastoral-item:last-child { border-bottom: none; }
  .pastoral-num {
    font-family: var(--serif);
    font-size: 1.1rem; color: var(--gold); flex-shrink: 0; margin-top: 1px;
    width: 24px;
  }
  .actions-row {
    display: flex; gap: 12px; flex-wrap: wrap; margin-top: 2.5rem;
    padding-top: 2rem; border-top: 1px solid rgba(255,255,255,.07);
  }
  .btn-outline {
    background: none;
    border: 1px solid rgba(255,255,255,.15);
    color: var(--cream3);
    font-family: var(--sans);
    font-size: 14px; font-weight: 400;
    letter-spacing: .06em; text-transform: uppercase;
    padding: 10px 22px; border-radius: 4px;
    cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .btn-outline:hover { border-color: rgba(255,255,255,.3); color: var(--cream); }

  /* ── PHASE COLORS ── */
  .p1 { --pc: #888780; --pb: rgba(136,135,128,.12); }
  .p2 { --pc: #B8860B; --pb: rgba(184,134,11,.12); }
  .p3 { --pc: #2a7a50; --pb: rgba(42,122,80,.12); }
  .p4 { --pc: #2a6090; --pb: rgba(42,96,144,.12); }
  .p5 { --pc: #7a4ab0; --pb: rgba(122,74,176,.12); }

  .phase-hero { background: var(--pb); border-color: color-mix(in srgb, var(--pc) 35%, transparent); }
  .phase-hero-band { color: color-mix(in srgb, var(--pc) 80%, var(--cream)); }
  .phase-number { color: var(--pc); opacity: .3; }
  .phase-label-sm { color: var(--pc); }
  .phase-name-lg { color: var(--cream); }
  .phase-tag { color: var(--pc); border-color: color-mix(in srgb, var(--pc) 50%, transparent); }
  .dim-bar-fill { background: var(--pc); }

  /* ── PRINT ── */
  @media print {
    body { background: #fff; color: #1a1a1a; }
    body::before { display: none; }
    .btn-primary, .btn-ghost, .btn-next, .btn-outline, .actions-row { display: none; }
    .phase-hero { background: #f5f5f0; border: 1px solid #ccc; }
  } 

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    #app { padding: 1.75rem 1.25rem 4rem; }
    .meta-grid { grid-template-columns: repeat(3,1fr); }
    .dim-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
const QS = [
  {
    section: "Section 1 — Relationship with God",
    text: "When someone asks why you're Catholic or Christian, what is your most honest answer?",
    guard: "Bias check: 'I was raised that way' and 'because I believe Jesus is Lord' are both valid — but they map to very different phases.",
    opts: [
      { t: "It's how I was raised — it's part of my family and identity", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "I'm not sure I have a strong reason, but I haven't left", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "I've started asking whether it's really true for me personally", s:{thr:2,soil:2,ls:2,hap:2} },
      { t: "I've had a personal encounter with God that changed how I see everything", s:{thr:4,soil:3,ls:3,hap:3} },
      { t: "Jesus Christ is Lord and I've given my life to Him — I'd say the same to anyone", s:{thr:5,soil:5,ls:4,hap:5} }
    ]
  },
  {
    section: "Section 1 — Relationship with God",
    text: "Have you ever made a conscious, specific decision to follow Jesus Christ as Lord — not just to be a good Catholic or Christian?",
    guard: "Bias check: baptism, confirmation, or being devout do not count unless accompanied by a personal act of surrender.",
    opts: [
      { t: "No — I've never thought about it that way", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "I'm not sure what that would even mean or feel like", s:{thr:2,soil:2,ls:2,hap:2} },
      { t: "I think so, but it was vague and I couldn't tell you when", s:{thr:3,soil:2,ls:2,hap:2} },
      { t: "Yes — there was a specific moment or period when I consciously surrendered", s:{thr:5,soil:3,ls:3,hap:3} },
      { t: "Yes — and I've renewed that commitment multiple times, especially after failure", s:{thr:5,soil:5,ls:4,hap:5} }
    ]
  },
  {
    section: "Section 1 — Relationship with God",
    text: "Describe your prayer life in the last month. Which is most accurate?",
    guard: "Bias check: occasional or obligatory prayer (before meals, at Mass) does not indicate an active prayer life.",
    opts: [
      { t: "I don't really pray outside of Mass or meals", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "I pray sometimes, but inconsistently and mostly when things are hard", s:{thr:2,soil:2,ls:2,hap:2} },
      { t: "I have a regular habit — a few times a week — though it's still developing", s:{thr:4,soil:3,ls:3,hap:3} },
      { t: "I have a daily prayer practice and notice when I skip it", s:{thr:5,soil:4,ls:3,hap:3} },
      { t: "Daily prayer is the anchor of my day — Scripture, silence, and real conversation with God", s:{thr:5,soil:5,ls:4,hap:5} }
    ]
  },
  {
    section: "Section 2 — Condition of the Heart",
    text: "Think of a genuinely hard season in the last few years — a failure, loss, or prolonged suffering. What happened to your faith?",
    guard: "Bias check: 'I got through it' is not evidence of deep soil. The question is whether faith deepened, held steady, or shrank under pressure.",
    opts: [
      { t: "I don't really connect my faith to my hard times", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "My faith faded or felt distant — I pulled away from God or the Church", s:{thr:2,soil:2,ls:2,hap:1} },
      { t: "I held on, but mostly out of habit or fear of losing my faith entirely", s:{thr:3,soil:2,ls:2,hap:2} },
      { t: "My faith was tested and held — I came out with more trust, not less", s:{thr:5,soil:3,ls:3,hap:3} },
      { t: "The hard season deepened my faith in ways nothing else could — I'm grateful for it", s:{thr:5,soil:5,ls:4,hap:5} }
    ]
  },
  {
    section: "Section 2 — Condition of the Heart",
    text: "What most consistently competes with God for your time, attention, or loyalty?",
    guard: "Bias check: every man has competing loves — this is not a shame question. The question is whether he sees them clearly and is doing something about them.",
    opts: [
      { t: "I don't think anything really competes — faith isn't that central to my decisions", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "Work, sports, entertainment — I know they crowd out things that matter, but I'm not dealing with it", s:{thr:2,soil:2,ls:2,hap:2} },
      { t: "Pornography, money anxiety, or alcohol — things I'm ashamed of but haven't conquered", s:{thr:3,soil:2,ls:2,hap:2} },
      { t: "I see the thorns, I'm in a real fight against them, and I have accountability", s:{thr:5,soil:3,ls:3,hap:3} },
      { t: "My biggest temptation now is subtle — pride, control, or self-reliance in ministry", s:{thr:5,soil:5,ls:4,hap:5} }
    ]
  },
  {
    section: "Section 2 — Condition of the Heart",
    text: "Has living your faith cost you something real — a relationship, opportunity, comfort, or reputation?",
    guard: "Bias check: being inconvenienced is not the same as paying a cost. Roots are proven by what a man holds when something presses against them.",
    opts: [
      { t: "No — my faith doesn't really create conflict with my life", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "It's created tension but I haven't had to make a hard stand yet", s:{thr:2,soil:2,ls:2,hap:2} },
      { t: "Yes — I've paid a cost and I'd do it again, though it was hard", s:{thr:5,soil:3,ls:3,hap:3} },
      { t: "Yes — multiple times, including losing something I really valued", s:{thr:5,soil:5,ls:4,hap:5} }
    ]
  },
  {
    section: "Section 3 — Spiritual Lifestage",
    text: "Who has most intentionally invested in your spiritual life — walked with you, challenged you, and called you forward?",
    guard: "Bias check: a priest who gave a good homily or a parent who brought you to Mass is not the same as a man who personally discipled you.",
    opts: [
      { t: "No one — I've figured things out on my own or just absorbed them from culture", s:{thr:1,soil:1,ls:1,hap:1} },
      { t: "Someone in my family or childhood faith, but no one since", s:{thr:2,soil:2,ls:2,hap:2} },
      { t: "A man who has personally walked with me, challenged me, and is still in my life", s:{thr:4,soil:3,ls:3,hap:3} },

const PHASES = [

const DIMS = [
  { key:'thr', label:'Threshold (Waddell)', labels:['Initial Trust','Curiosity','Openness / Seeking','Seeking → Discipleship','Intentional Disciple','Apostolic Mission'] },
  { key:'soil', label:'Soil type (Parable)', labels:['Path / Hard Ground','Rocky Ground','Thorny Ground breaking','Rocky → Good Soil','Good Soil (cultivated)'] },
  { key:'ls', label:'Lifestage', labels:['Wounded Boy','Seeker','Young Man (early)','Young Man (maturing)','Father / King / Elder'] },
  { key:'hap', label:'Happiness level (Spitzer)', labels:['Level 1 dominant','Level 1–2','Level 2–3 transition','Level 3 awakening','Level 4 integration'] }
];

let cur = 0, answers = [], shuffles = [];

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function avg(scores, key) {
  let sum = 0;
  scores.forEach(s => sum += s[key]);
  return sum / scores.length;
}

function getPhase(answers) {
  const scores = answers.map((dispIdx, qi) => {
    const origIdx = shuffles[qi] ? shuffles[qi][dispIdx] : dispIdx;
    return QS[qi].opts[origIdx].s;
  });
  const a = {
    thr: avg(scores,'thr'),
    soil: avg(scores,'soil'),
    ls: avg(scores,'ls'),
    hap: avg(scores,'hap')
  };
  const raw = (a.thr + a.soil + a.ls + a.hap) / 4;
  const adj = Math.max(1, raw - 0.15);
  const idx = Math.min(4, Math.max(0, Math.round(adj) - 1));
  return { phase: PHASES[idx], avgs: a };
}

function dimLabel(d, v) {
  const idx = Math.min(d.labels.length-1, Math.max(0, Math.round(v)-1));
  return d.labels[idx];
}

function dimPct(v) {
  return Math.round(((v-1)/4)*100);
}

/* ── RENDER ── */

}

function renderQuestion() {
  const q = QS[cur];
  const pct = Math.round((cur / QS.length) * 100);
  const sel = answers[cur];
  const order = shuffles[cur] || [...Array(q.opts.length).keys()];
  document.getElementById('app').innerHTML = `
    <div class="screen">
      <div class="wordmark">
        <div class="cross-icon"></div>
        <div class="wordmark-text">Men's Ministry Assessment</div>
      </div>
      <div class="q-header">
        <span class="section-badge">${q.section}</span>
        <span class="q-counter">${cur+1} / ${QS.length}</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" style="width:${pct}%"></div>
      </div>
      <p class="q-text">${q.text}</p>
      ${q.guard ? `<div class="q-guard"><svg class="guard-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3"/><circle cx="8" cy="11" r=".5" fill="currentColor"/></svg>${q.guard}</div>` : ''}
      <div class="opts">
        ${order.map((origIdx, dispIdx) => `<div class="opt${sel===dispIdx?' selected':''}" onclick="selectOpt(${dispIdx})">${q.opts[origIdx].t}</div>`).join('')}
      </div>
      <div class="nav-row">

        <button class="btn-next" id="nextBtn" onclick="goNext()" ${sel===undefined?'disabled':''}>

        </button>
      </div>
    </div>`;
}

function renderResult() {
  const { phase: p, avgs } = getPhase(answers);

        <button class="btn-outline" onclick="window.print()">Print result</button>

    </div>`;
}

/* ── ACTIONS ── */
function startAssessment() { cur = 0; answers = []; shuffles = QS.map(q => shuffle([...Array(q.opts.length).keys()])); renderQuestion(); }
function restart() { cur = 0; answers = []; shuffles = []; renderIntro(); }

function selectOpt(i) {
  answers[cur] = i;
  renderQuestion();
}

function goNext() {
  if (answers[cur] === undefined) return;
  if (cur < QS.length - 1) { cur++; renderQuestion(); }
  else { renderResult(); }
}

function goBack() {
  if (cur > 0) { cur--; renderQuestion(); }
  else { renderIntro(); }
}

/* ── INIT ── */
renderIntro();
</script>
